<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Moon Bridge Console</title>
    <!--
      Material Design 3 Expressive type + iconography.
      Roboto Flex (variable) is the M3 text font; Roboto Mono is used for code
      and log output; Material Symbols Rounded (variable: optical-size, weight,
      fill, grade) powers every <md-icon> and .material-symbol glyph. Loading
      the web fonts removes the reliance on a system-installed icon font and
      unlocks the FILL axis used for expressive selected/active states.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..900&family=Roboto+Mono:wght@400..600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..200&display=block"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
